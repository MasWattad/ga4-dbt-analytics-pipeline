version: 2

models:
  - name: fact_sessions
    description: >
      Session-level fact table built from GA4 events.
      Grain: 1 row per (user_id, session_id, session_date).
      Contains session timing, engagement, conversion and revenue metrics,
      plus session attributes (traffic, device, geo).

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - user_id
              - session_id
              - session_date

    columns:
      - name: user_id
        tests:
          - not_null

      - name: session_id
        tests:
          - not_null

      - name: session_date
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_day

      - name: session_start_ts
        tests:
          - not_null

      - name: session_end_ts
        tests:
          - not_null

      - name: events_count
        tests:
          - not_null

      - name: engagement_time_msec
        tests:
          - not_null

      - name: engagement_time_seconds
        tests:
          - not_null

      - name: session_revenue
        tests:
          - not_null

      - name: conversion_flag
        tests:
          - not_null

      - name: device_category
        tests:
          - relationships:
              arguments:
                to: ref('dim_device')
                field: device_category

      - name: country
        tests:
          - relationships:
              arguments:
                to: ref('dim_geo')
                field: country